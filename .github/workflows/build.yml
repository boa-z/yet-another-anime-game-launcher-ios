name: Xcode - Build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      xcode_version:
        description: Xcode version to select
        type: string
        required: false
        default: "26.6"
      simulator_device:
        description: Simulator device name for tests
        type: string
        required: false
        default: "iPhone 17"
      release_nightly:
        description: Publish or replace the nightly release
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: xcode-build-${{ github.ref }}
  cancel-in-progress: true

env:
  scheme: YaaglIOS
  archive_path: archive
  xcode_version: ${{ inputs.xcode_version || '26.6' }}
  simulator_device: ${{ inputs.simulator_device || 'iPhone 17' }}

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test using xcodebuild command
    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.xcode_version }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Xcode container
        id: xcode_container
        run: |
          set -eu
          filetype_parameter=project
          file_to_build="$(find . -maxdepth 1 -name "*.xcworkspace" -print -quit)"
          if [ -n "$file_to_build" ]; then
            filetype_parameter=workspace
          else
            file_to_build="$(find . -maxdepth 1 -name "*.xcodeproj" -print -quit)"
          fi
          if [ -z "$file_to_build" ]; then
            echo "No .xcworkspace or .xcodeproj found" >&2
            exit 1
          fi
          file_to_build="${file_to_build#./}"
          echo "filetype_parameter=$filetype_parameter" >> "$GITHUB_OUTPUT"
          echo "file_to_build=$file_to_build" >> "$GITHUB_OUTPUT"

      - name: List schemes
        run: xcodebuild -list -${{ steps.xcode_container.outputs.filetype_parameter }} "${{ steps.xcode_container.outputs.file_to_build }}"

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme "$scheme" \
            -${{ steps.xcode_container.outputs.filetype_parameter }} "${{ steps.xcode_container.outputs.file_to_build }}" \
            -destination "platform=iOS Simulator,name=$simulator_device,OS=latest"

  build:
    name: Archive and package unsigned IPA
    runs-on: macos-26
    needs: [test]
    outputs:
      archive_artifact: ${{ steps.build_metadata.outputs.archive_artifact }}
      ipa_artifact: ${{ steps.build_metadata.outputs.ipa_artifact }}
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.xcode_version }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Xcode container
        id: xcode_container
        run: |
          set -eu
          filetype_parameter=project
          file_to_build="$(find . -maxdepth 1 -name "*.xcworkspace" -print -quit)"
          if [ -n "$file_to_build" ]; then
            filetype_parameter=workspace
          else
            file_to_build="$(find . -maxdepth 1 -name "*.xcodeproj" -print -quit)"
          fi
          if [ -z "$file_to_build" ]; then
            echo "No .xcworkspace or .xcodeproj found" >&2
            exit 1
          fi
          file_to_build="${file_to_build#./}"
          echo "filetype_parameter=$filetype_parameter" >> "$GITHUB_OUTPUT"
          echo "file_to_build=$file_to_build" >> "$GITHUB_OUTPUT"

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -archivePath "$archive_path" \
            -scheme "$scheme" \
            -${{ steps.xcode_container.outputs.filetype_parameter }} "${{ steps.xcode_container.outputs.file_to_build }}" \
            -sdk iphoneos \
            -arch arm64 \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Tar archive artifact
        run: tar -cf "$archive_path.xcarchive.tar" "$archive_path.xcarchive"

      - name: Package unsigned IPA
        run: sh .github/build_github.sh

      - name: Validate unsigned IPA
        run: |
          set -eu
          unzip -l "$scheme.ipa" > ipa_contents.txt
          grep -Eq "Payload/[^/]+\\.app/$" ipa_contents.txt
          if grep -Eq "(_CodeSignature|embedded\\.mobileprovision)" ipa_contents.txt; then
            cat ipa_contents.txt
            echo "IPA contains signing artifacts" >&2
            exit 1
          fi

      - name: Export build metadata
        id: build_metadata
        run: |
          echo "archive_artifact=$archive_path.xcarchive.tar" >> "$GITHUB_OUTPUT"
          echo "ipa_artifact=$scheme.ipa" >> "$GITHUB_OUTPUT"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.archive_path }}.xcarchive.tar
          path: ${{ env.archive_path }}.xcarchive.tar
          retention-days: 30

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.scheme }}.ipa
          path: ${{ env.scheme }}.ipa
          retention-days: 30

  release_nightly:
    name: Nightly Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.release_nightly
    concurrency:
      group: release-nightly
      cancel-in-progress: true
    steps:
      - name: Download unsigned IPA
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.ipa_artifact }}

      - name: Download archive
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.archive_artifact }}

      - name: Publish nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          make_latest: false
          overwrite_files: true
          body: |
            **Commit:** ${{ github.sha }}

            Built from ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}.
          files: |
            ${{ needs.build.outputs.ipa_artifact }}
            ${{ needs.build.outputs.archive_artifact }}
