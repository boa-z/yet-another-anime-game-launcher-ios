name: Xcode - Build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      xcode_version:
        description: Xcode version to select
        type: string
        required: false
        default: "26.6"
      simulator_device:
        description: Simulator device name for tests
        type: string
        required: false
        default: "iPhone 17"
      release_nightly:
        description: Publish or replace the nightly release
        type: boolean
        required: false
        default: false
      release__nightly:
        description: LiveContainer-compatible alias for publishing or replacing the nightly release
        type: boolean
        required: false
        default: false
      marketing_version:
        description: Marketing version to stamp into CI archives
        type: string
        required: false
        default: "0.1.0"

permissions:
  contents: read

concurrency:
  group: xcode-build-${{ github.ref }}
  cancel-in-progress: true

env:
  scheme: YaaglIOS
  archive_path: archive
  xcode_version: ${{ inputs.xcode_version || '26.6' }}
  simulator_device: ${{ inputs.simulator_device || 'iPhone 17' }}
  marketing_version: ${{ inputs.marketing_version || '0.1.0' }}

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test using xcodebuild command
    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.xcode_version }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Xcode container
        id: xcode_container
        run: |
          set -eu
          filetype_parameter=project
          file_to_build="$(find . -maxdepth 1 -name "*.xcworkspace" -print -quit)"
          if [ -n "$file_to_build" ]; then
            filetype_parameter=workspace
          else
            file_to_build="$(find . -maxdepth 1 -name "*.xcodeproj" -print -quit)"
          fi
          if [ -z "$file_to_build" ]; then
            echo "No .xcworkspace or .xcodeproj found" >&2
            exit 1
          fi
          file_to_build="${file_to_build#./}"
          echo "filetype_parameter=$filetype_parameter" >> "$GITHUB_OUTPUT"
          echo "file_to_build=$file_to_build" >> "$GITHUB_OUTPUT"

      - name: List schemes
        run: xcodebuild -list -${{ steps.xcode_container.outputs.filetype_parameter }} "${{ steps.xcode_container.outputs.file_to_build }}"

      - name: Resolve simulator destination
        id: simulator
        run: |
          set -eu
          destination="$(
            ruby <<'RUBY'
          require "json"

          requested = ENV.fetch("simulator_device")
          devices = JSON.parse(`xcrun simctl list devices available -j`).fetch("devices")
          ios_devices = devices
            .select { |runtime, _| runtime.include?("iOS") }
            .values
            .flatten
            .select { |device| device["isAvailable"] }
          selected = ios_devices.find { |device| device["name"] == requested } ||
            ios_devices.find { |device| device["name"].start_with?("iPhone") } ||
            ios_devices.first
          abort "No available iOS simulator devices found" unless selected
          puts "platform=iOS Simulator,id=#{selected.fetch("udid")}"
          RUBY
          )"
          echo "destination=$destination" >> "$GITHUB_OUTPUT"
          echo "Using $destination"

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme "$scheme" \
            -${{ steps.xcode_container.outputs.filetype_parameter }} "${{ steps.xcode_container.outputs.file_to_build }}" \
            -destination "${{ steps.simulator.outputs.destination }}"

  build:
    name: Archive and package unsigned IPA
    runs-on: macos-26
    needs: [test]
    outputs:
      archive_artifact: ${{ steps.build_metadata.outputs.archive_artifact }}
      ipa_artifact: ${{ steps.build_metadata.outputs.ipa_artifact }}
      build_number: ${{ steps.build_metadata.outputs.build_number }}
      commit_sha: ${{ steps.build_metadata.outputs.commit_sha }}
      short_sha: ${{ steps.build_metadata.outputs.short_sha }}
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.xcode_version }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute build metadata
        id: metadata
        run: |
          set -eu
          commit_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=7 HEAD)"
          build_number="${GITHUB_RUN_NUMBER}"
          artifact_stem="${scheme}-${marketing_version}.${build_number}-${short_sha}"
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "archive_artifact=${artifact_stem}.xcarchive.tar" >> "$GITHUB_OUTPUT"
          echo "ipa_artifact=${artifact_stem}.ipa" >> "$GITHUB_OUTPUT"
          echo "Build $marketing_version ($build_number) from $short_sha"

      - name: Resolve Xcode container
        id: xcode_container
        run: |
          set -eu
          filetype_parameter=project
          file_to_build="$(find . -maxdepth 1 -name "*.xcworkspace" -print -quit)"
          if [ -n "$file_to_build" ]; then
            filetype_parameter=workspace
          else
            file_to_build="$(find . -maxdepth 1 -name "*.xcodeproj" -print -quit)"
          fi
          if [ -z "$file_to_build" ]; then
            echo "No .xcworkspace or .xcodeproj found" >&2
            exit 1
          fi
          file_to_build="${file_to_build#./}"
          echo "filetype_parameter=$filetype_parameter" >> "$GITHUB_OUTPUT"
          echo "file_to_build=$file_to_build" >> "$GITHUB_OUTPUT"

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -archivePath "$archive_path" \
            -scheme "$scheme" \
            -${{ steps.xcode_container.outputs.filetype_parameter }} "${{ steps.xcode_container.outputs.file_to_build }}" \
            -sdk iphoneos \
            -arch arm64 \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CURRENT_PROJECT_VERSION="${{ steps.metadata.outputs.build_number }}" \
            MARKETING_VERSION="$marketing_version"

      - name: Tar archive artifact
        run: tar -cf "${{ steps.metadata.outputs.archive_artifact }}" "$archive_path.xcarchive"

      - name: Package unsigned IPA
        run: ipa_name="${{ steps.metadata.outputs.ipa_artifact }}" sh .github/build_github.sh

      - name: Validate unsigned IPA
        run: |
          set -eu
          unzip -l "${{ steps.metadata.outputs.ipa_artifact }}" > ipa_contents.txt
          grep -Eq "Payload/[^/]+\\.app/$" ipa_contents.txt
          if grep -Eq "(_CodeSignature|embedded\\.mobileprovision)" ipa_contents.txt; then
            cat ipa_contents.txt
            echo "IPA contains signing artifacts" >&2
            exit 1
          fi

      - name: Export build metadata
        id: build_metadata
        run: |
          echo "archive_artifact=${{ steps.metadata.outputs.archive_artifact }}" >> "$GITHUB_OUTPUT"
          echo "ipa_artifact=${{ steps.metadata.outputs.ipa_artifact }}" >> "$GITHUB_OUTPUT"
          echo "build_number=${{ steps.metadata.outputs.build_number }}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${{ steps.metadata.outputs.commit_sha }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${{ steps.metadata.outputs.short_sha }}" >> "$GITHUB_OUTPUT"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.archive_artifact }}
          path: ${{ steps.metadata.outputs.archive_artifact }}
          retention-days: 30

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.ipa_artifact }}
          path: ${{ steps.metadata.outputs.ipa_artifact }}
          retention-days: 30

  release_nightly:
    name: Nightly Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.release_nightly || inputs.release__nightly)) ||
      (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    concurrency:
      group: release-nightly
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download unsigned IPA
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.ipa_artifact }}

      - name: Download archive
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.archive_artifact }}

      - name: Create stable nightly IPA alias
        run: cp "${{ needs.build.outputs.ipa_artifact }}" YaaglIOS.ipa

      - name: Resolve release metadata
        id: release_metadata
        run: |
          set -eu
          commit_message="$(git log -1 --pretty=%B)"
          delimiter="$(uuidgen)"
          {
            echo "commit_message<<$delimiter"
            echo "$commit_message"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Move nightly tag
        run: |
          set -eu
          git tag -f nightly "${{ needs.build.outputs.commit_sha }}"
          git push --force origin refs/tags/nightly

      - name: Remove previous nightly assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          if ! gh release view nightly --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi

          gh release view nightly --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' |
            while IFS= read -r asset_name; do
              [ -n "$asset_name" ] || continue
              gh release delete-asset nightly "$asset_name" --repo "$GITHUB_REPOSITORY" --yes
            done

      - name: Publish nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          make_latest: false
          overwrite_files: true
          body: |
            **Commit:** ${{ needs.build.outputs.commit_sha }}
            **Message:** ${{ steps.release_metadata.outputs.commit_message }}
            **Build:** ${{ env.marketing_version }} (${{ needs.build.outputs.build_number }})
            **Short SHA:** ${{ needs.build.outputs.short_sha }}

            Built from ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}.
          files: |
            YaaglIOS.ipa
            ${{ needs.build.outputs.archive_artifact }}

  release_tag:
    name: Tagged Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    concurrency:
      group: release-tag-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download unsigned IPA
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.ipa_artifact }}

      - name: Download archive
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.archive_artifact }}

      - name: Resolve release metadata
        id: release_metadata
        run: |
          set -eu
          commit_message="$(git log -1 --pretty=%B)"
          delimiter="$(uuidgen)"
          {
            echo "commit_message<<$delimiter"
            echo "$commit_message"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Publish tagged release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: legacy
          overwrite_files: true
          body: |
            **Commit:** ${{ needs.build.outputs.commit_sha }}
            **Message:** ${{ steps.release_metadata.outputs.commit_message }}
            **Build:** ${{ env.marketing_version }} (${{ needs.build.outputs.build_number }})
            **Short SHA:** ${{ needs.build.outputs.short_sha }}

            Built from ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}.
          files: |
            ${{ needs.build.outputs.ipa_artifact }}
            ${{ needs.build.outputs.archive_artifact }}
